    <!-- Force German as default language if not set -->
    <script>
      (function() {
        try {
          const currentLang = localStorage.getItem('language');
          // If no language is set OR if it's set to anything other than 'de' or 'en', force German
          if (!currentLang || (currentLang !== 'de' && currentLang !== 'en')) {
            localStorage.setItem('language', 'de');
          }
          // Set HTML lang attribute
          document.documentElement.lang = localStorage.getItem('language') || 'de';
        } catch (e) {
          console.warn('Could not set language:', e);
          document.documentElement.lang = 'de';
        }
      })();
    </script>
