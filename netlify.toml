# Netlify Configuration for Lynck Services
# This file configures build settings and deployment for Netlify

[build]
  # Build command - runs vite build
  command = "npm run build"

  # Directory where build output is generated
  publish = "dist"

  # Node.js version (use LTS)
  [build.environment]
    NODE_VERSION = "18"

# Redirect all requests to index.html for client-side routing (SPA)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets for 1 year
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Supabase Edge Functions (if needed)
# Edge functions will be called from your Supabase project directly
# No additional configuration needed here

# Build plugins (optional - for optimization)
[[plugins]]
  package = "@netlify/plugin-lighthouse"
